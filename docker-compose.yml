version: "3.8"

services:
  api:
    build: .
    container_name: pliris-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-postgresql://postgres:password@db:5432/pliris}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-knowledge-base}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-5-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - OPENAI_EMBEDDING_DIMENSIONS=${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      - GUEST_UI_SHARED_SECRET=${GUEST_UI_SHARED_SECRET}
      - GUEST_REQUEST_WINDOW_SECONDS=${GUEST_REQUEST_WINDOW_SECONDS:-60}
      - GUEST_REQUESTS_PER_WINDOW=${GUEST_REQUESTS_PER_WINDOW:-5}
      - GUEST_MAX_REQUESTS_PER_SESSION=${GUEST_MAX_REQUESTS_PER_SESSION:-40}
      - GUEST_SESSION_RETENTION_SECONDS=${GUEST_SESSION_RETENTION_SECONDS:-86400}
    volumes:
      - ./logs:/app/logs
      - ./outputs:/app/outputs
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build: .
    container_name: pliris-public-ui
    ports:
      - "8501:8501"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - API_URL=http://api:8000
      - API_TIMEOUT_SECONDS=${API_TIMEOUT_SECONDS:-90}
      - PLIRIS_UI_MODE=public
      - GUEST_UI_SHARED_SECRET=${GUEST_UI_SHARED_SECRET}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - api
    command: streamlit run app/Home.py --server.address 0.0.0.0 --server.port 8501

  streamlit-developer:
    profiles: ["developer"]
    build: .
    container_name: pliris-developer-ui
    ports:
      - "8502:8501"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - API_URL=http://api:8000
      - API_TIMEOUT_SECONDS=${API_TIMEOUT_SECONDS:-90}
      - PLIRIS_UI_MODE=developer
      - GUEST_UI_SHARED_SECRET=${GUEST_UI_SHARED_SECRET}
      - DEVELOPER_UI_ACCESS_KEY=${DEVELOPER_UI_ACCESS_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - api
    command: streamlit run app/Home.py --server.address 0.0.0.0 --server.port 8501
